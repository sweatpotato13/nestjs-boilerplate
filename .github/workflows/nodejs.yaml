# .github/workflows/nodejs.yml
name: Node CI

on: [push, pull_request] # Run on Push and Pull Requests

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, 22.x]
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm install -g pnpm
    - name: pnpm build
      working-directory: .
      run: |
        pnpm install
        pnpm build
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, 22.x]
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm install -g pnpm
    - name: pnpm test
      working-directory: .
      run: |
        pnpm install
        npx prisma generate
        pnpm test
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, 22.x]
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm install -g pnpm
    - name: pnpm lint
      working-directory: .
      run: |
        pnpm install
        pnpm lint